<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay & Ty Motorbike Trip — Alaska, June–July 2001</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    header {
      text-align: center;
      padding: 16px 16px 8px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #e0e0e0;
    }

    header .counter {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    /* Image area */
    .image-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 0;
      cursor: pointer;
    }

    .image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: opacity 0.3s ease;
      padding: 8px;
    }

    .image-container img.loading {
      opacity: 0;
    }

    /* Caption */
    .caption {
      text-align: center;
      padding: 8px 16px;
      font-size: 0.85rem;
      color: #aaa;
      min-height: 2em;
      flex-shrink: 0;
    }

    /* Navigation arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.08);
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      z-index: 10;
    }

    .nav-arrow:hover {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    .nav-arrow.prev { left: 12px; }
    .nav-arrow.next { right: 12px; }

    /* Hide arrows on mobile — use swipe instead */
    @media (max-width: 600px) {
      .nav-arrow { display: none; }
    }

    /* Stepper / dots */
    .stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px 20px;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
      max-height: 80px;
      overflow: hidden;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: background 0.3s, transform 0.3s;
      flex-shrink: 0;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.35);
    }

    .dot.near {
      background: rgba(255, 255, 255, 0.45);
    }

    /* Progress bar (alternative for many images) */
    .progress-bar {
      width: 100%;
      padding: 0 24px 20px;
      flex-shrink: 0;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Swipe hint on first load */
    .swipe-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      animation: fadeOut 3s forwards;
      pointer-events: none;
    }

    @keyframes fadeOut {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="gallery">
    <header>
      <h1>Jay &amp; Ty Motorbike Trip &mdash; Alaska, June&ndash;July 2001</h1>
      <div class="counter"><span id="current">1</span> / <span id="total"></span></div>
    </header>

    <div class="image-container" id="imageContainer">
      <button class="nav-arrow prev" id="prevBtn" aria-label="Previous">&lsaquo;</button>
      <img id="photo" src="" alt="Alaska photo">
      <button class="nav-arrow next" id="nextBtn" aria-label="Next">&rsaquo;</button>
    </div>

    <div class="caption" id="caption"></div>

    <div class="progress-bar">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <script>
    // Order matches original site navigation: index → A2 → A3 → ... → A11
    const photos = [
      // Page 1 (index)
      { src: "images/21L.jpg", caption: "" },
      { src: "images/22L.jpg", caption: "" },
      { src: "images/3vL.jpg", caption: "" },
      { src: "images/57L.jpg", caption: "" },
      { src: "images/19L.jpg", caption: "" },
      { src: "images/17L.jpg", caption: "" },
      // Page 2
      { src: "images/8vL.jpg", caption: "" },
      { src: "images/15L.jpg", caption: "" },
      { src: "images/56L.jpg", caption: "" },
      { src: "images/54L.jpg", caption: "The Surefooted Swede." },
      { src: "images/23L.jpg", caption: "" },
      { src: "images/55L.jpg", caption: "" },
      // Page 3
      { src: "images/53L.jpg", caption: "Glacier National Peace Park." },
      { src: "images/30L.jpg", caption: "" },
      { src: "images/6vL.jpg", caption: "" },
      { src: "images/31L.jpg", caption: "Denali Highway." },
      { src: "images/17vL.jpg", caption: "" },
      { src: "images/25L.jpg", caption: "" },
      // Page 4
      { src: "images/4vL.jpg", caption: "" },
      { src: "images/18L.jpg", caption: "" },
      { src: "images/11L.jpg", caption: "" },
      { src: "images/10L.jpg", caption: "" },
      { src: "images/24L.jpg", caption: "" },
      { src: "images/1L.jpg", caption: "Highway 34." },
      // Page 5
      { src: "images/35L.jpg", caption: "" },
      { src: "images/18vL.jpg", caption: "Waterton Park." },
      { src: "images/20L.jpg", caption: "" },
      { src: "images/8L.jpg", caption: "" },
      { src: "images/20vL.jpg", caption: "" },
      { src: "images/6L.jpg", caption: "" },
      // Page 6
      { src: "images/12L.jpg", caption: "" },
      { src: "images/4L.jpg", caption: "" },
      { src: "images/16L.jpg", caption: "" },
      { src: "images/33L.jpg", caption: "" },
      { src: "images/37L.jpg", caption: "" },
      { src: "images/34L.jpg", caption: "" },
      // Page 7
      { src: "images/39L.jpg", caption: "" },
      { src: "images/40L.jpg", caption: "" },
      { src: "images/38L.jpg", caption: "Fishing hip waders." },
      { src: "images/36L.jpg", caption: "" },
      { src: "images/13vL.jpg", caption: "Perfect Alaska fishing companion." },
      { src: "images/27L.jpg", caption: "" },
      // Page 8
      { src: "images/12vL.jpg", caption: "" },
      { src: "images/26L.jpg", caption: "" },
      { src: "images/32L.jpg", caption: "Alaska Marine Highway." },
      { src: "images/11vL.jpg", caption: "" },
      { src: "images/29L.jpg", caption: "" },
      { src: "images/45L.jpg", caption: "" },
      // Page 9
      { src: "images/9vL.jpg", caption: "Alaska wildlife." },
      { src: "images/10vL.jpg", caption: "" },
      { src: "images/44L.jpg", caption: "Spendin' the Gs." },
      { src: "images/47L.jpg", caption: "" },
      { src: "images/43L.jpg", caption: "" },
      { src: "images/41L.jpg", caption: "" },
      // Page 10
      { src: "images/42L.jpg", caption: "Puget Sound." },
      { src: "images/52L.jpg", caption: "Grandma's garage." },
      { src: "images/49L.jpg", caption: "" },
      { src: "images/14vL.jpg", caption: "" },
      { src: "images/15vL.jpg", caption: "" },
      { src: "images/46L.jpg", caption: "W7VY." },
      // Page 11
      { src: "images/50L.jpg", caption: "" },
      { src: "images/48L.jpg", caption: "Dave and Kerry eating blackberries." },
      { src: "images/16vL.jpg", caption: "Joel Stonington in Portland." },
      { src: "images/51L.jpg", caption: "" },
      { src: "images/2L.jpg", caption: "Jen Hale in her bedroom." },
      { src: "images/3L.jpg", caption: "" },
    ];

    let index = 0;
    const img = document.getElementById("photo");
    const caption = document.getElementById("caption");
    const currentEl = document.getElementById("current");
    const totalEl = document.getElementById("total");
    const progressFill = document.getElementById("progressFill");
    const container = document.getElementById("imageContainer");

    totalEl.textContent = photos.length;

    // Preload adjacent images
    function preload(i) {
      if (i >= 0 && i < photos.length) {
        const link = new Image();
        link.src = photos[i].src;
      }
    }

    function show(i) {
      index = i;
      img.classList.add("loading");
      img.onload = () => img.classList.remove("loading");
      img.src = photos[i].src;
      caption.textContent = photos[i].caption;
      currentEl.textContent = i + 1;
      progressFill.style.width = ((i + 1) / photos.length * 100) + "%";

      // Preload neighbors
      preload(i + 1);
      preload(i - 1);
    }

    function next() {
      show(index < photos.length - 1 ? index + 1 : 0);
    }

    function prev() {
      show(index > 0 ? index - 1 : photos.length - 1);
    }

    // Click image to advance
    container.addEventListener("click", (e) => {
      if (e.target.closest(".nav-arrow")) return;
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (x < rect.width * 0.3) {
        prev();
      } else {
        next();
      }
    });

    // Arrow buttons
    document.getElementById("prevBtn").addEventListener("click", prev);
    document.getElementById("nextBtn").addEventListener("click", next);

    // Keyboard
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
      if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
    });

    // Touch swipe
    let touchStartX = 0;
    let touchStartY = 0;

    container.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    container.addEventListener("touchend", (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) next();
        else prev();
      }
    }, { passive: true });

    // Start
    show(0);
  </script>
</body>
</html>
